name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: TypeScript and Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Forbidden import guard
        run: npm run lint

      - name: TypeScript build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Python syntax check
        run: npm run check:python

      - name: Determinism replay gate
        run: npm run check:determinism
